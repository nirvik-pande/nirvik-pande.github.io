<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — Nirvik Pande</title>
  <meta name="description" content="Writing by Nirvik Pande." />
  <meta property="og:title" content="Blog — Nirvik Pande" />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #111111; --bg-2: #191919; --bg-3: #222222;
      --border:   #2e2e2e; --border-hi: #555550;
      --text:     #f0ede6; --text-2: #aaa89f; --text-3: #666660;
      --accent:   #00e676;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'Syne', sans-serif;
      --sp-1:8px; --sp-2:16px; --sp-3:24px; --sp-4:32px;
      --sp-5:40px; --sp-6:48px; --sp-8:64px; --sp-10:80px;
      --text-xs:11px; --text-sm:13px; --text-base:16px;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--sans); font-size: var(--text-base);
      line-height: 1.6; min-height: 100vh; overflow-x: hidden;
      display: flex; flex-direction: column;
    }

    body::before {
      content: ''; position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);
      pointer-events: none; z-index: 9999;
    }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 var(--sp-6); background: rgba(17,17,17,0.9);
      backdrop-filter: blur(16px); border-bottom: 1px solid var(--border);
      height: var(--sp-8);
    }
    .nav-logo { font-family: var(--mono); font-size: var(--text-xs); color: var(--accent); letter-spacing: 0.06em; text-decoration: none; }
    .nav-links { display: flex; gap: var(--sp-5); list-style: none; }
    .nav-links a { font-family: var(--mono); font-size: var(--text-xs); color: var(--text-2); text-decoration: none; letter-spacing: 0.08em; transition: color 0.18s ease; }
    .nav-links a::before { content: '// '; color: var(--text-3); transition: color 0.18s ease; }
    .nav-links a:hover, .nav-links a.active { color: var(--text); }
    .nav-links a:hover::before, .nav-links a.active::before { color: var(--accent); }

    main {
      flex: 1;
      padding: calc(var(--sp-8) + var(--sp-6)) var(--sp-6) var(--sp-8);
      max-width: 800px; width: 100%; margin: 0 auto;
    }

    .page-header { margin-bottom: var(--sp-8); }

    .page-label {
      font-family: var(--mono); font-size: var(--text-xs); color: var(--text-3);
      letter-spacing: 0.2em; text-transform: uppercase;
      display: flex; align-items: center; gap: var(--sp-2); margin-bottom: var(--sp-2);
      opacity: 0; transform: translateY(12px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .page-label::before { content: ''; display: block; width: var(--sp-4); height: 1px; background: var(--border-hi); }
    .page-label.visible { opacity: 1; transform: translateY(0); }

    .page-title {
      font-family: var(--sans); font-size: clamp(36px, 5vw, 56px);
      font-weight: 700; line-height: 1.0; letter-spacing: -0.02em; color: var(--text);
      min-height: 1.1em;
    }

    .type-cursor {
      display: inline-block; width: 3px; height: 0.85em;
      background: var(--accent); vertical-align: middle;
      margin-left: 2px; animation: blink 1s step-end infinite;
    }

    /* ── POST LIST ── */
    .post-list { display: flex; flex-direction: column; }

    .post-item {
      display: grid; grid-template-columns: 80px 1fr;
      gap: var(--sp-4); align-items: baseline;
      padding: var(--sp-3) 0; border-bottom: 1px solid var(--border);
      text-decoration: none; color: inherit;
      opacity: 0; transform: translateY(16px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .post-item:first-child { border-top: 1px solid var(--border); }
    .post-item.visible { opacity: 1; transform: translateY(0); }
    .post-item:hover .post-title { color: var(--accent); }

    .post-date { font-family: var(--mono); font-size: var(--text-xs); color: var(--text-3); letter-spacing: 0.06em; padding-top: 3px; }
    .post-title { font-family: var(--sans); font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 4px; transition: color 0.18s ease; }
    .post-excerpt { font-family: var(--mono); font-size: var(--text-sm); color: var(--text-2); line-height: 1.6; }
    .post-tag { display: inline-block; font-family: var(--mono); font-size: 10px; color: var(--text-3); border: 1px solid var(--border); padding: 2px var(--sp-1); margin-top: var(--sp-1); letter-spacing: 0.06em; }

    .empty {
      font-family: var(--mono); font-size: var(--text-sm); color: var(--text-3);
      padding: var(--sp-6) 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
      opacity: 0; transform: translateY(12px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .empty.visible { opacity: 1; transform: translateY(0); }
    .empty span { color: var(--accent); }

    /* ── BOTTOM BAR ── */
    .bottom-bar {
      border-top: 1px solid var(--border); background: var(--bg-2);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 var(--sp-6); height: var(--sp-6); flex-shrink: 0;
    }
    .bottom-left { display: flex; align-items: center; gap: var(--sp-4); }
    .status-item { display: flex; align-items: center; gap: var(--sp-1); font-family: var(--mono); font-size: var(--text-xs); color: var(--text-3); white-space: nowrap; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
    .status-item .label { color: var(--text-2); }
    .bottom-right { display: flex; gap: var(--sp-3); list-style: none; }
    .bottom-right a { font-family: var(--mono); font-size: var(--text-xs); color: var(--text-3); text-decoration: none; transition: color 0.18s ease; }
    .bottom-right a:hover { color: var(--accent); }

    @keyframes blink { 50% { opacity: 0; } }

    @media (max-width: 800px) {
      nav { padding: 0 var(--sp-2); } .nav-links { gap: var(--sp-3); }
      main { padding: calc(var(--sp-8) + var(--sp-4)) var(--sp-3) var(--sp-6); }
      .post-item { grid-template-columns: 1fr; gap: var(--sp-1); }
      .bottom-bar { height: auto; flex-direction: column; align-items: flex-start; gap: var(--sp-2); padding: var(--sp-2) var(--sp-3); }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">nirvik@wsl:~$</a>
    <ul class="nav-links">
      <li><a href="about.html">about</a></li>
      <li><a href="projects.html">projects</a></li>
      <li><a href="blog.html" class="active">blog</a></li>
    </ul>
  </nav>

  <main>
    <div class="page-header">
      <p class="page-label" id="page-label">writing</p>
      <h1 class="page-title" id="page-title"><span class="type-cursor"></span></h1>
    </div>

    <div class="post-list">
      <!-- when you write a post, add it here:
      <a class="post-item" href="posts/post-slug.html">
        <span class="post-date">2025-03</span>
        <div class="post-right">
          <p class="post-title">Post Title Here</p>
          <p class="post-excerpt">One sentence about what this post is about.</p>
          <span class="post-tag">tag</span>
        </div>
      </a>
      -->
    </div>

    <div class="empty" id="empty">
      <span>// </span>no posts yet — check back soon.
    </div>
  </main>

  <div class="bottom-bar">
    <div class="bottom-left">
      <div class="status-item">
        <div class="status-dot"></div>
        <span class="label">location:</span>&nbsp;Pittsburgh, PA
      </div>
    </div>
    <ul class="bottom-right">
      <li><a href="https://github.com/nirvik-pande" target="_blank" rel="noopener">github</a></li>
      <li><a href="https://www.linkedin.com/in/nirvikpande/" target="_blank" rel="noopener">linkedin</a></li>
      <li><a href="https://scholar.google.com/citations?user=csnn2EYAAAAJ&hl=en&oi=ao" target="_blank" rel="noopener">scholar</a></li>
      <li><a href="mailto:nirvikpande@gmail.com">email</a></li>
    </ul>
  </div>

  <script>
    const wait = ms => new Promise(r => setTimeout(r, ms));

    async function typeInto(el, text, speed = 55) {
      const cursor = el.querySelector('.type-cursor');
      for (let i = 0; i <= text.length; i++) {
        el.textContent = text.slice(0, i);
        el.appendChild(cursor);
        await wait(speed + Math.random() * 25);
      }
      cursor.remove();
    }

    async function runSequence() {
      await wait(120);
      document.getElementById('page-label').classList.add('visible');
      await wait(300);
      await typeInto(document.getElementById('page-title'), 'Blog');
      await wait(200);

      // animate any post items if they exist
      const posts = document.querySelectorAll('.post-item');
      for (const [i, post] of posts.entries()) {
        await wait(100);
        post.classList.add('visible');
      }

      // show empty state if no posts
      if (posts.length === 0) {
        await wait(100);
        document.getElementById('empty').classList.add('visible');
      }
    }

    runSequence();
  </script>
</body>
</html>
